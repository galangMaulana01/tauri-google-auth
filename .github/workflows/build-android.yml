name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;27.0.11902837"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11902837" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install ImageMagick & generate RGBA icons
        run: |
          sudo apt-get install -y imagemagick
          cd src-tauri/icons
          magick icon.png -resize 32x32 -type TrueColorAlpha -depth 8 PNG32:32x32.png
          magick icon.png -resize 128x128 -type TrueColorAlpha -depth 8 PNG32:128x128.png
          magick icon.png -resize 256x256 -type TrueColorAlpha -depth 8 "PNG32:128x128@2x.png"
          magick icon.png -resize 256x256 -type TrueColorAlpha -depth 8 PNG32:icon.icns
          magick icon.png -resize 256x256 -type TrueColorAlpha -depth 8 PNG32:icon.ico
          magick identify -verbose 32x32.png | grep Type

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Tauri Android
        run: cargo tauri android init

      - name: Decode google-services.json dari secret
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > src-tauri/gen/android/app/google-services.json

      - name: Build Android APK
        run: cargo tauri android build --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tauri-google-auth-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
